services:
  vybusna-kotatka:
    build:
      context: .
      dockerfile: Dockerfile
#    image: ghcr.io/elvisek2020/web-exploding_kitten:latest
    container_name: vybusna-kotatka
    ports:
      - "8080:8000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-TvojeSilneHeslo123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TOKEN_EXPIRY_SECONDS=${TOKEN_EXPIRY_SECONDS:-3600}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      # IP reverse proxy, jejimz X-Forwarded-For hlavickam se ma verit
      # (napr. "172.20.0.1"); "*" = verit vsem (jen pokud je port nepristupny primo)
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-127.0.0.1}
    restart: unless-stopped
