<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <title>Výbušná koťátka</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="main-title" style="cursor: pointer;" title="Klikni pro obnovení stránky">Výbušná koťátka</h1>
        </header>

        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <div class="box login-box">
                <h2>Super Power Přihlášení</h2>
                <input type="text" id="player-name" placeholder="Zadej své jméno" maxlength="20">
                <input type="password" id="player-password" placeholder="Zadej heslo" maxlength="50">
                <button id="join-btn" class="btn-primary">Přihlásit</button>
                <div id="login-error" class="error-message"></div>
                <div style="text-align: center; margin-top: 15px; font-size: 0.9em;">
                    <a href="/" style="color: #667eea; text-decoration: none; opacity: 0.7;">&larr; Normální přihlášení</a>
                </div>
            </div>
        </div>

        <!-- Lobby Browser Screen -->
        <div id="lobby-browser-screen" class="screen hidden">
            <div class="box lobby-browser-box">
                <h2>Herní místnosti (Admin)</h2>
                <div id="lobbies-list" class="lobbies-list"></div>
                <div class="create-lobby-form">
                    <input type="text" id="new-lobby-name" placeholder="Název nové místnosti" maxlength="30">
                    <button id="create-lobby-btn" class="btn-primary">Vytvořit místnost</button>
                </div>
                <button id="logout-btn" class="btn-secondary">Odhlásit se</button>
            </div>
        </div>

        <!-- Lobby Screen (Room) -->
        <div id="lobby-screen" class="screen hidden">
            <div class="box lobby-box">
                <h2 id="room-title">Místnost (Super Power)</h2>
                <div id="players-list" class="players-list"></div>
                <button id="ready-btn" class="btn-primary">Připraven</button>
                <button id="leave-btn" class="btn-secondary">Opustit místnost</button>
                <div id="lobby-status" class="status-message"></div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen hidden">
            <div class="game-container">
                <div class="deck-players-row">
                    <div class="box deck-info-box">
                        <h3>Balíček</h3>
                        <div id="deck-size" class="deck-size">-</div>
                    </div>
                    <div id="players-container" class="players-container"></div>
                    <div class="box messages-box">
                        <h3>Průběh hry</h3>
                        <div id="game-messages" class="messages"></div>
                    </div>
                </div>

                <div class="box actions-box">
                    <button id="draw-card-btn" class="btn-primary">Líznout kartu</button>
                    <button id="restart-game-btn" class="btn-primary hidden">Začít novou hru</button>
                    <button id="leave-room-btn" class="btn-secondary hidden">Zpět do místností</button>
                </div>

                <div class="box hand-box">
                    <h3>Tvoje karty</h3>
                    <div id="my-hand" class="hand"></div>
                </div>

                <!-- Super Power Actions -->
                <div class="box super-power-box hidden">
                    <h3>Super Power - Administrace</h3>
                    <div style="display: flex; gap: 10px; flex-wrap: nowrap; align-items: center;">
                        <button id="view-deck-btn" class="btn-secondary">Zobrazit balíček</button>
                        <button id="end-game-btn" class="btn-secondary">Ukončit hru</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- See Future Modal -->
    <div id="see-future-modal" class="modal">
        <div class="modal-content">
            <h3>Pohledni do budoucnosti - Top 3 karty</h3>
            <div id="modal-cards" class="modal-cards"></div>
            <button id="close-modal-btn" class="btn-primary">Zavřít</button>
        </div>
    </div>

    <!-- Favor Target Selection Modal -->
    <div id="favor-modal" class="modal">
        <div class="modal-content">
            <h3>Vyber cílového hráče pro Tohle si vezmu</h3>
            <div id="favor-players-list" class="favor-players-list"></div>
            <button id="cancel-favor-btn" class="btn-secondary">Zrušit</button>
        </div>
    </div>

    <!-- View Deck Modal -->
    <div id="view-deck-modal" class="modal">
        <div class="modal-content">
            <h3>Dobírací balíček - všechny karty</h3>
            <div id="deck-cards" class="modal-cards"></div>
            <button id="close-deck-modal-btn" class="btn-primary">Zavřít</button>
        </div>
    </div>

    <!-- Explosion Effect Overlay -->
    <div id="explosion-overlay" class="explosion-overlay"></div>

    <script src="/static/app.js"></script>
    <script>
        let isSuperPower = false;

        // Override lobby update to show remove buttons for admin
        const _origUpdateLobby = window.updateLobby;
        window.updateLobby = function(state) {
            _origUpdateLobby.call(this, state);

            const myPlayer = state.players.find(p => p.player_id === playerId);
            if (myPlayer && myPlayer.is_super_power) {
                isSuperPower = true;
                const list = document.getElementById('players-list');
                if (!list) return;
                const items = list.querySelectorAll('.player-item');
                items.forEach(item => {
                    const nameSpan = item.querySelector('.player-name');
                    if (!nameSpan) return;
                    const pName = nameSpan.textContent.trim();
                    const p = state.players.find(x => x.name === pName && x.player_id !== playerId);
                    if (p && !p.is_super_power && !item.querySelector('.remove-player-btn')) {
                        const btn = document.createElement('button');
                        btn.className = 'remove-player-btn btn-secondary';
                        btn.textContent = '✕';
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (ws?.readyState === WebSocket.OPEN) {
                                ws.send(JSON.stringify({ type: 'remove_player', target_player_id: p.player_id }));
                            }
                        });
                        const left = item.querySelector('.player-item-left');
                        if (left) left.insertBefore(btn, left.firstChild);
                        else item.insertBefore(btn, item.firstChild);
                    }
                });
            }
        };

        // Override game update to show admin panel
        const _origUpdateGame = window.updateGame;
        window.updateGame = function(state) {
            _origUpdateGame.call(this, state);
            const box = document.querySelector('.super-power-box');
            if (box) {
                const mp = state.players.find(p => p.player_id === playerId);
                if (mp && mp.is_super_power && state.status === 'playing') {
                    box.classList.remove('hidden');
                } else {
                    box.classList.add('hidden');
                }
            }
        };

        // Deck modal for admin
        function showDeckModal(cards) {
            const modal = document.getElementById('view-deck-modal');
            const div = document.getElementById('deck-cards');
            if (!modal || !div) return;
            div.innerHTML = '';
            if (cards.length === 0) { div.innerHTML = '<p>Balíček je prázdný</p>'; modal.classList.add('show'); return; }
            cards.forEach(c => {
                const cd = document.createElement('div');
                cd.className = `card card-type-${c.type.toLowerCase()}`;
                if (c.asset_path) {
                    cd.style.backgroundImage = `url(${c.asset_path})`;
                    cd.style.backgroundSize = 'cover';
                    cd.style.backgroundPosition = 'center';
                    cd.classList.add('has-image');
                }
                cd.innerHTML = `<div class="card-title">${escapeHtml(c.title)}</div>`;
                div.appendChild(cd);
            });
            modal.classList.add('show');
        }

        // Admin button handlers
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('end-game-btn')?.addEventListener('click', () => {
                if (!ws || ws.readyState !== WebSocket.OPEN || !isSuperPower) return;
                if (confirm('Opravdu chcete ukončit hru předčasně?')) {
                    ws.send(JSON.stringify({ type: 'end_game' }));
                }
            });

            document.getElementById('view-deck-btn')?.addEventListener('click', () => {
                if (!ws || ws.readyState !== WebSocket.OPEN || !isSuperPower) return;
                ws.send(JSON.stringify({ type: 'view_deck' }));
            });

            document.getElementById('close-deck-modal-btn')?.addEventListener('click', () => {
                const m = document.getElementById('view-deck-modal');
                if (m) m.classList.remove('show');
            });
        });

        // Override handleMessage for admin-specific messages
        const _origHandleMessage = window.handleMessage;
        window.handleMessage = function(message) {
            if (message.type === 'deck_view') {
                showDeckModal(message.cards || []);
                return;
            }
            _origHandleMessage.call(this, message);
        };
    </script>
</body>
</html>
